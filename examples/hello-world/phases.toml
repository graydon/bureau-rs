# Sample phases.toml. Models are OpenRouter model IDs — see
# https://openrouter.ai/models for the full list. Defaults to qwen3-coder,
# which is cheap (~$0.20/M in, ~$0.80/M out) and tool-use capable.
#
# Each phase can optionally override `model` per role:
#   actor_model    = "<model>"  # does the work (defaults to `model`)
#   critic_model   = "<model>"  # cheap is fine; just spots problems
#   reviser_model  = "<model>"  # should be at least as smart as actor
#   judge_model    = "<model>"  # cheap is fine; just yes/no with a reason
#
# `critique_retries` (default 0) enables the actor → critic → reviser → judge
# loop per task. 0 disables it (cheapest). 1 means "one critique round, accept
# whatever judge says". 2+ means "keep iterating until judge approves or cap
# is hit". Each round adds ~3 extra LLM calls per task, so use sparingly.

[phases.spec]
model = "openai/gpt-5.4-mini"
max_tokens = 4096
max_retries = 2
max_turns = 30
critique_retries = 1     # spec gets a critique pass too — it's the foundation for every later phase

[phases.interface]
model = "openai/gpt-5.4-mini"
max_tokens = 4096
max_retries = 2
max_turns = 30
critique_retries = 1     # syntax errors are common; one critique round helps a lot
critic_model = "openai/gpt-5.4-mini"
judge_model = "openai/gpt-5.4-mini"

[phases.test]
model = "openai/gpt-5.4-mini"
max_tokens = 4096
max_retries = 2
max_turns = 30
critique_retries = 1

[phases.impl]
model = "openai/gpt-5.4-mini"
max_tokens = 4096
max_retries = 3
max_turns = 30
critique_retries = 1     # impl is the hardest; critique is most valuable here

[phases.debug]
model = "openai/gpt-5.4-mini"
max_tokens = 4096
max_retries = 5
max_turns = 30
critique_retries = 0     # debug already has a tight cargo-check loop

[phases.opt]
model = "openai/gpt-5.4-mini"
max_tokens = 4096
max_retries = 2
max_turns = 30
critique_retries = 0

[limits]
max_file_lines = 150
max_spec_section_lines = 300
max_parallel_tasks = 4
cost_cap_usd = 5.0

[provider]
# Defaults to OPENROUTER_API_KEY; override here if you use a different env var
# or a proxy.
# api_key_env = "OPENROUTER_API_KEY"
# base_url    = "https://openrouter.ai/api/v1"

[layout]
# "single" (default) — produce one crate at the workdir root.
# "workspace"        — produce a Cargo workspace with members under crates/<name>/.
kind = "single"
